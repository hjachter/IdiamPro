<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { width: 1200px; height: 630px; }

  #card {
    position: relative;
    width: 1200px;
    height: 630px;
    overflow: hidden;
    font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    /* Deep premium navy → near-black, brand-tinted */
    background:
      radial-gradient(1200px 820px at 68% 30%, rgba(37,99,235,0.30) 0%, rgba(37,99,235,0.10) 34%, rgba(6,9,18,0) 62%),
      radial-gradient(1000px 760px at 92% 96%, rgba(79,70,229,0.24) 0%, rgba(79,70,229,0) 58%),
      radial-gradient(760px 620px at 6% 6%, rgba(56,189,248,0.14) 0%, rgba(56,189,248,0) 55%),
      linear-gradient(150deg, #0b1230 0%, #070b1a 46%, #04060f 100%);
    color: #fff;
  }

  /* Faint blueprint dot-grid — the serious-tool / engineer's-bench feel */
  #grid {
    position: absolute; inset: 0;
    background-image: radial-gradient(rgba(120,150,220,0.10) 1px, transparent 1.4px);
    background-size: 34px 34px;
    mask-image: radial-gradient(1200px 720px at 52% 42%, #000 0%, rgba(0,0,0,0.4) 72%, transparent 100%);
    -webkit-mask-image: radial-gradient(1200px 720px at 52% 42%, #000 0%, rgba(0,0,0,0.4) 72%, transparent 100%);
  }

  /* Hairline top accent line */
  #topline {
    position: absolute; top: 0; left: 0; right: 0; height: 5px;
    background: linear-gradient(90deg, #38bdf8 0%, #2563eb 46%, #4f46e5 100%);
    opacity: 0.92;
  }

  /* ---------- TOP: brand + value line ---------- */
  #top {
    position: absolute;
    left: 78px; right: 78px; top: 40px; height: 322px;
    display: flex; flex-direction: column; justify-content: center;
  }

  #lockup { display: flex; align-items: center; gap: 20px; margin-bottom: 16px; }

  #mark {
    width: 74px; height: 74px; border-radius: 19px;
    background: linear-gradient(150deg, #3b82f6 0%, #2563eb 48%, #1d4ed8 100%);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 12px 40px rgba(37,99,235,0.55), inset 0 1px 0 rgba(255,255,255,0.30);
  }
  #mark svg { width: 60%; height: 60%; }

  #wordmark {
    font-weight: 800;
    font-size: 80px;
    line-height: 0.92;
    letter-spacing: -0.03em;
  }
  #wordmark .idea { color: #f4f7ff; }
  #wordmark .m {
    background: linear-gradient(135deg, #60c6ff 0%, #3b82f6 50%, #6366f1 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }

  #eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    font-size: 17px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: #7fa6ff;
    margin-bottom: 20px;
  }

  /* HERO value line — the striking one */
  #hero {
    font-weight: 800;
    font-size: 62px;
    line-height: 1.02;
    letter-spacing: -0.025em;
    color: #ffffff;
    margin-bottom: 16px;
  }
  #hero .glow {
    background: linear-gradient(120deg, #eaf3ff 0%, #9dc4ff 60%, #7aa6ff 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }

  #subtitle {
    font-weight: 500;
    font-size: 27px;
    letter-spacing: -0.005em;
    color: #b9c8ea;
  }

  /* URL — top-right mono chip */
  #url {
    position: absolute; top: 52px; right: 80px;
    display: inline-flex; align-items: center; gap: 11px;
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600; font-size: 20px; letter-spacing: 0.02em;
    color: #9fb2da;
  }
  #url .dot { width: 9px; height: 9px; border-radius: 50%; background: #38bdf8; box-shadow: 0 0 12px 2px rgba(56,189,248,0.85); }

  /* ---------- BOTTOM: raw thought → engineered idea → finished work ---------- */
  #band { position: absolute; left: 0; right: 0; bottom: 0; height: 268px; }
</style>
</head>
<body>
  <div id="card">
    <div id="grid"></div>
    <div id="topline"></div>

    <div id="url"><span class="dot"></span>2ndbrainware.com</div>

    <!-- TOP brand + value block -->
    <div id="top">
      <div id="lockup">
        <div id="mark">
          <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <rect x="20" y="56" width="12" height="20" rx="6" fill="#fff"/>
            <rect x="38" y="42" width="12" height="34" rx="6" fill="#fff"/>
            <rect x="56" y="28" width="12" height="48" rx="6" fill="#fff"/>
            <rect x="74" y="14" width="12" height="62" rx="6" fill="#fff"/>
          </svg>
        </div>
        <div id="wordmark"><span class="idea">Idea</span><span class="m">M</span></div>
      </div>

      <div id="eyebrow">The Idea Workbench</div>
      <div id="hero">The <span class="glow">engineering</span> of thought.</div>
      <div id="subtitle">for professional thinkers and students</div>
    </div>

    <!-- BOTTOM assembly band: raw → engineered → finished -->
    <svg id="band" viewBox="0 0 1200 268" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="flow" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0" stop-color="#60c6ff"/>
          <stop offset="1" stop-color="#6366f1"/>
        </linearGradient>
        <linearGradient id="chip" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="rgba(255,255,255,0.11)"/>
          <stop offset="1" stop-color="rgba(255,255,255,0.03)"/>
        </linearGradient>
        <linearGradient id="cardFill" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="rgba(56,110,220,0.20)"/>
          <stop offset="1" stop-color="rgba(20,32,70,0.30)"/>
        </linearGradient>
        <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
          <feGaussianBlur stdDeviation="6" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="softglow" x="-120%" y="-120%" width="340%" height="340%">
          <feGaussianBlur stdDeviation="20"/>
        </filter>
        <marker id="arrow" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
          <path d="M0 0 L10 5 L0 10 z" fill="#7fb0ff"/>
        </marker>
      </defs>

      <!-- workbench baseline rule with ruler ticks -->
      <g stroke="rgba(130,160,220,0.28)" stroke-width="1.5">
        <line x1="120" y1="214" x2="1080" y2="214"/>
      </g>
      <g stroke="rgba(130,160,220,0.30)" stroke-width="1.5">
        <line x1="150" y1="214" x2="150" y2="222"/>
        <line x1="250" y1="214" x2="250" y2="224"/>
        <line x1="350" y1="214" x2="350" y2="222"/>
        <line x1="450" y1="214" x2="450" y2="222"/>
        <line x1="550" y1="214" x2="550" y2="224"/>
        <line x1="650" y1="214" x2="650" y2="222"/>
        <line x1="750" y1="214" x2="750" y2="224"/>
        <line x1="850" y1="214" x2="850" y2="222"/>
        <line x1="950" y1="214" x2="950" y2="224"/>
        <line x1="1050" y1="214" x2="1050" y2="222"/>
      </g>

      <!-- flow arrows between stages -->
      <line x1="322" y1="104" x2="452" y2="104" stroke="url(#flow)" stroke-width="3" marker-end="url(#arrow)" opacity="0.9"/>
      <line x1="752" y1="104" x2="866" y2="104" stroke="url(#flow)" stroke-width="3" marker-end="url(#arrow)" opacity="0.9"/>
      <!-- flow dots -->
      <circle cx="387" cy="104" r="3.4" fill="#bfe0ff"/>
      <circle cx="809" cy="104" r="3.4" fill="#bfe0ff"/>

      <!-- ============ STAGE A: RAW THOUGHT (small, rough) ============ -->
      <g transform="translate(230,104)">
        <circle r="66" fill="none" stroke="rgba(150,175,225,0.34)" stroke-width="2" stroke-dasharray="5 7"/>
        <!-- rough, loose scribble -->
        <path d="M-30 12 C -34 -8, -14 -20, -2 -10 C 8 -2, -6 8, -14 2 C -20 -2, -10 -14, 2 -14 C 20 -14, 30 2, 22 16 C 16 26, -2 28, -12 20"
              fill="none" stroke="#9fb6e6" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
        <!-- tiny spark -->
        <g stroke="#bfe0ff" stroke-width="2.4" stroke-linecap="round" opacity="0.95">
          <line x1="30" y1="-30" x2="30" y2="-40"/>
          <line x1="25" y1="-25" x2="18" y2="-32"/>
          <line x1="35" y1="-25" x2="42" y2="-32"/>
        </g>
        <circle cx="30" cy="-30" r="3.2" fill="#eaf3ff"/>
      </g>

      <!-- ============ STAGE B: ENGINEERED IDEA (largest, the emphasis) ============ -->
      <g transform="translate(600,104)">
        <!-- aura -->
        <circle cx="0" cy="4" r="112" fill="#2563eb" opacity="0.30" filter="url(#softglow)"/>
        <!-- blueprint card -->
        <rect x="-118" y="-92" width="236" height="184" rx="16"
              fill="url(#cardFill)" stroke="#5f8dff" stroke-width="2" filter="url(#glow)"/>
        <!-- faint inner blueprint grid -->
        <g stroke="rgba(140,170,235,0.16)" stroke-width="1">
          <line x1="-118" y1="-46" x2="118" y2="-46"/>
          <line x1="-118" y1="0" x2="118" y2="0"/>
          <line x1="-118" y1="46" x2="118" y2="46"/>
          <line x1="-59" y1="-92" x2="-59" y2="92"/>
          <line x1="0" y1="-92" x2="0" y2="92"/>
          <line x1="59" y1="-92" x2="59" y2="92"/>
        </g>
        <!-- scaffold corner brackets -->
        <g stroke="#7fb0ff" stroke-width="2.6" fill="none" stroke-linecap="round" opacity="0.9">
          <path d="M-118 -70 L-118 -92 L-96 -92"/>
          <path d="M118 -70 L118 -92 L96 -92"/>
          <path d="M-118 70 L-118 92 L-96 92"/>
          <path d="M118 70 L118 92 L96 92"/>
        </g>

        <!-- outline node tree being engineered -->
        <!-- connector spine (elbow lines parent -> children) -->
        <g stroke="#7fb0ff" stroke-width="2.4" fill="none" opacity="0.85">
          <path d="M-74 -46 L-74 -6 L-54 -6"/>
          <path d="M-74 -6 L-74 34 L-54 34"/>
          <path d="M-74 34 L-74 66 L-54 66"/>
        </g>
        <!-- parent node -->
        <circle cx="-80" cy="-46" r="6" fill="#eaf3ff"/>
        <rect x="-68" y="-53" width="120" height="14" rx="7" fill="#eaf3ff"/>
        <!-- child rows -->
        <circle cx="-54" cy="-6" r="5" fill="#bcd6ff"/>
        <rect x="-44" y="-12" width="96" height="12" rx="6" fill="#bcd6ff"/>
        <circle cx="-54" cy="34" r="5" fill="#bcd6ff"/>
        <rect x="-44" y="28" width="110" height="12" rx="6" fill="#bcd6ff"/>
        <!-- last child: still being built (dashed) -->
        <circle cx="-54" cy="66" r="5" fill="none" stroke="#8fb6ff" stroke-width="2"/>
        <rect x="-44" y="60" width="78" height="12" rx="6" fill="none" stroke="#8fb6ff" stroke-width="2" stroke-dasharray="5 5"/>

        <!-- engineer's cue: gear/cog glyph, top-right inside card -->
        <g transform="translate(84,-58)" stroke="#9fd0ff" stroke-linecap="round">
          <g stroke-width="2.6">
            <line x1="0" y1="-15" x2="0" y2="-9"/>
            <line x1="0" y1="15" x2="0" y2="9"/>
            <line x1="-15" y1="0" x2="-9" y2="0"/>
            <line x1="15" y1="0" x2="9" y2="0"/>
            <line x1="-10.6" y1="-10.6" x2="-6.4" y2="-6.4"/>
            <line x1="10.6" y1="10.6" x2="6.4" y2="6.4"/>
            <line x1="-10.6" y1="10.6" x2="-6.4" y2="6.4"/>
            <line x1="10.6" y1="-10.6" x2="6.4" y2="-6.4"/>
          </g>
          <circle cx="0" cy="0" r="7" fill="none" stroke-width="2.6"/>
          <circle cx="0" cy="0" r="2.4" fill="#9fd0ff" stroke="none"/>
        </g>

        <!-- dimension ticks along bottom edge -->
        <g stroke="rgba(150,180,240,0.55)" stroke-width="1.5">
          <line x1="-96" y1="82" x2="-96" y2="88"/>
          <line x1="-96" y1="85" x2="96" y2="85"/>
          <line x1="96" y1="82" x2="96" y2="88"/>
        </g>
      </g>

      <!-- ============ STAGE C: FINISHED WORK (2x2 clean glyphs) ============ -->
      <g transform="translate(960,104)" font-family="'IBM Plex Mono', monospace">
        <!-- WRITE (top-left) -->
        <g transform="translate(-52,-46)">
          <circle r="34" fill="url(#chip)" stroke="rgba(120,150,220,0.42)" stroke-width="1.5"/>
          <circle r="34" fill="none" stroke="#60c6ff" stroke-width="1" opacity="0.25"/>
          <g stroke="#eaf2ff" stroke-width="2.2" stroke-linecap="round" fill="none">
            <rect x="-10" y="-13" width="20" height="26" rx="3.5" stroke="#eaf2ff" stroke-width="2.2"/>
            <line x1="-5" y1="-6" x2="5" y2="-6"/>
            <line x1="-5" y1="0" x2="5" y2="0"/>
            <line x1="-5" y1="6" x2="1" y2="6"/>
          </g>
        </g>
        <!-- PODCAST (top-right) -->
        <g transform="translate(52,-46)">
          <circle r="34" fill="url(#chip)" stroke="rgba(120,150,220,0.42)" stroke-width="1.5"/>
          <circle r="34" fill="none" stroke="#60c6ff" stroke-width="1" opacity="0.25"/>
          <g stroke="#eaf2ff" stroke-width="2.8" stroke-linecap="round">
            <line x1="-13" y1="-5" x2="-13" y2="5"/>
            <line x1="-6.5" y1="-10" x2="-6.5" y2="10"/>
            <line x1="0" y1="-15" x2="0" y2="15"/>
            <line x1="6.5" y1="-9" x2="6.5" y2="9"/>
            <line x1="13" y1="-4" x2="13" y2="4"/>
          </g>
        </g>
        <!-- VIDEO (bottom-left) -->
        <g transform="translate(-52,46)">
          <circle r="34" fill="url(#chip)" stroke="rgba(120,150,220,0.42)" stroke-width="1.5"/>
          <circle r="34" fill="none" stroke="#60c6ff" stroke-width="1" opacity="0.25"/>
          <path d="M-8 -12 L13 0 L-8 12 Z" fill="#eaf2ff"/>
        </g>
        <!-- SHARE (bottom-right) -->
        <g transform="translate(52,46)">
          <circle r="34" fill="url(#chip)" stroke="rgba(120,150,220,0.42)" stroke-width="1.5"/>
          <circle r="34" fill="none" stroke="#60c6ff" stroke-width="1" opacity="0.25"/>
          <g stroke="#eaf2ff" stroke-width="2.2" fill="none">
            <circle cx="-11" cy="0" r="4.2" fill="#eaf2ff" stroke="none"/>
            <circle cx="10" cy="-9" r="4.2" fill="#eaf2ff" stroke="none"/>
            <circle cx="10" cy="9" r="4.2" fill="#eaf2ff" stroke="none"/>
            <line x1="-7.5" y1="-1.8" x2="6.5" y2="-7.5" stroke-linecap="round"/>
            <line x1="-7.5" y1="1.8" x2="6.5" y2="7.5" stroke-linecap="round"/>
          </g>
        </g>
      </g>

      <!-- ============ STAGE LABELS ============ -->
      <g font-family="'IBM Plex Mono', monospace" font-weight="600" letter-spacing="2.2" text-anchor="middle">
        <text x="230" y="250" font-size="15" fill="#8296bf">RAW THOUGHT</text>
        <text x="600" y="250" font-size="16" fill="#aecbff">ENGINEERED IDEA</text>
        <text x="960" y="250" font-size="15" fill="#8296bf">FINISHED WORK</text>
      </g>
    </svg>
  </div>
</body>
</html>
